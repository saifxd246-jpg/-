<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف الشيخ ياسر الدوسري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0c0c0c;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .player-card {
            background: #181818;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #282828;
        }
        .cover-art {
            width: 100%;
            height: 250px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h2 { margin: 10px 0 5px; font-size: 22px; color: #fff; }
        .artist { color: #1DB954; font-size: 16px; margin-bottom: 20px; font-weight: bold; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #282828;
            color: #fff;
            border: 1px solid #444;
            margin-bottom: 20px;
            font-family: 'Cairo';
            font-size: 15px;
            cursor: pointer;
        }

        audio { width: 100%; filter: invert(1); } /* لجعل المشغل يتماشى مع اللون الداكن */

        .status-text { font-size: 12px; color: #777; margin-top: 8px; }

        /* منطقة الحقوق (باسمك وباسم سيف) */
        .footer-credits {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .credit-label { font-size: 13px; color: #aaa; margin-bottom: 5px; }
        .developers {
            font-size: 15px;
            color: #1DB954;
            font-weight: bold;
            line-height: 1.6;
        }
        .heart { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="cover-art">
            <img id="trackImg" src="https://images.unsplash.com/photo-1542816417-0983c9c9ad53?w=500" alt="Cover">
        </div>
        
        <h2>سورة الفاتحة</h2>
        <div class="artist">الشيخ ياسر الدوسري</div>

        <select id="surahMenu" onchange="playNewSurah()">
            </select>

        <audio id="audioPlayer" controls>
            <source id="audioSrc" src="https://server11.mp3quran.net/yasser/001.mp3" type="audio/mpeg">
        </audio>
        
        <div class="status-text" id="statusLabel">جاهز للاستماع</div>
    </div>

    <div class="footer-credits">
        <div class="credit-label">تم التطوير بكل <span class="heart">❤</span> بواسطة:</div>
        <div class="developers">
            كريم علاء احمد عبد الباقي <br>
            سيف علاء احمد عبد الباقي
        </div>
    </div>

    <script>
        const surahArray = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

        const menu = document.getElementById('surahMenu');
        const player = document.getElementById('audioPlayer');
        const source = document.getElementById('audioSrc');
        const title = document.querySelector('h2');
        const status = document.getElementById('statusLabel');

        // تعبئة القائمة
        surahArray.forEach((name, i) => {
            let opt = document.createElement('option');
            opt.value = (i + 1).toString().padStart(3, '0');
            opt.text = `${i+1}. ${name}`;
            menu.appendChild(opt);
        });

        function playNewSurah() {
            const num = menu.value;
            const name = menu.options[menu.selectedIndex].text;
            source.src = `https://server11.mp3quran.net/yasser/${num}.mp3`;
            title.innerText = name;
            player.load();
            player.play();
            status.innerText = "جاري تشغيل " + name;
        }

        player.onplaying = () => { status.innerText = "يتم التشغيل الآن..."; };
        player.onerror = () => { status.innerText = "خطأ: تأكد من الاتصال بالإنترنت"; };
    </script>
</body>
</html>
